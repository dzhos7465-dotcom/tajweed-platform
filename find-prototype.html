<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Найди в аяте</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
body { margin: 0; background: var(--paper); }
.wrap { max-width: 480px; margin: 0 auto; padding: var(--space-5) var(--space-4) 220px; min-height: 100vh; box-sizing: border-box; }

/* Заголовок задания с группой */
.task-head { margin-bottom: var(--space-5); }
.task-eyebrow { font-size: var(--text-xs); font-weight: var(--weight-semi); letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: var(--space-3); }
.task-question { font-size: var(--text-xl); font-weight: var(--weight-bold); color: var(--ink); line-height: 1.3; }
.task-question .grp { color: var(--group-color, var(--seal)); }
.task-sub { font-size: var(--text-sm); color: var(--ink-soft); margin-top: var(--space-2); }

/* Аят — герой, дышащий */
.ayah { direction: rtl; text-align: center; font-family: var(--font-arabic);
        font-size: 2.7rem; line-height: 2.9; color: var(--ink);
        padding: var(--space-6) var(--space-2); margin-bottom: var(--space-4); }
.word { cursor: pointer; padding: 4px 8px; border-radius: 10px;
        transition: background var(--motion-base) var(--ease), color var(--motion-base) var(--ease), box-shadow var(--motion-base) var(--ease);
        -webkit-tap-highlight-color: transparent; }
.word:active { transform: scale(0.97); }
.word.active { box-shadow: 0 0 0 2.5px var(--group-color, var(--seal)); background: var(--paper-raised); }
.word.marked { color: #fff; }

/* нижняя панель выбора правила — поднимается */
.picker { position: fixed; left: 0; right: 0; bottom: 0;
          max-width: 480px; margin: 0 auto;
          background: var(--paper-raised); border-top: 1px solid var(--line-strong);
          border-radius: var(--radius-xl) var(--radius-xl) 0 0;
          padding: var(--space-5) var(--space-4) var(--space-6);
          box-shadow: 0 -8px 32px rgba(0,0,0,0.10);
          transform: translateY(110%); transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1); }
.picker.up { transform: translateY(0); }
.picker-title { font-size: var(--text-sm); color: var(--ink-soft); text-align: center; margin-bottom: var(--space-4); }
.picker-title .pw { font-family: var(--font-arabic); font-size: 1.7rem; color: var(--ink); vertical-align: middle; }
.rule-btns { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.rule-btn { display: flex; align-items: center; justify-content: center; gap: var(--space-3);
            font-family: var(--font-ui); font-size: var(--text-base); font-weight: var(--weight-semi);
            border: 2px solid var(--btn-color); background: var(--paper); color: var(--ink);
            border-radius: var(--radius); padding: var(--space-4); cursor: pointer;
            transition: background var(--motion-base) var(--ease); -webkit-tap-highlight-color: transparent; }
.rule-btn:active { background: var(--btn-tint); }
.rule-btn .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--btn-color); flex-shrink: 0; }
.picker-clear { width: 100%; margin-top: var(--space-3); background: transparent; border: none;
                color: var(--ink-faint); font-size: var(--text-sm); cursor: pointer; padding: var(--space-2); }

/* нижняя строка действий */
.actbar { position: fixed; left: 0; right: 0; bottom: 0; max-width: 480px; margin: 0 auto;
          display: flex; align-items: center; gap: var(--space-3);
          padding: var(--space-4); background: linear-gradient(transparent, var(--paper) 30%); }
.progress { font-size: var(--text-sm); color: var(--ink-soft); }
.progress b { color: var(--group-color, var(--seal)); }
.btn-done { flex: 1; background: var(--group-color, var(--seal)); color: #fff; border: none;
            border-radius: var(--radius); padding: var(--space-4); font-family: var(--font-ui);
            font-size: var(--text-base); font-weight: var(--weight-semi); cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <div class="task-head">
    <div class="task-eyebrow">Найди в аяте</div>
    <div class="task-question">Найди все правила <span class="grp" id="grp-name">нуна</span></div>
    <div class="task-sub">Нажми на слово и выбери правило</div>
  </div>
  <div class="ayah" id="ayah"></div>
</div>

<div class="actbar" id="actbar">
  <span class="progress">Отмечено: <b id="count">0</b></span>
  <button class="btn-done" id="btn-done">Готово</button>
</div>

<div class="picker" id="picker">
  <div class="picker-title">Правило в слове <span class="pw" id="pw"></span></div>
  <div class="rule-btns" id="rule-btns"></div>
  <button class="picker-clear" id="clear">Убрать метку</button>
</div>

<script src="knowledge.js"></script>
<script src="pedagogy.js"></script>
<script src="ayahs.js"></script>
<script src="ayah-marks.js"></script>
<script>
(function () {
  'use strict';
  const $ = id => document.getElementById(id);
  const RULE_NAMES = { izhar_mim:'Изхар', idgham_mim:'Идгам', ikhfa_mim:'Ихфа',
    izhar_nun:'Изхар', idgham_nun:'Идгам', iqlab_nun:'Икляб', ikhfa_nun:'Ихфа' };

  // Группы (без шадды): нун=4, мим=3
  const GROUPS = {
    nun: { name:'нуна', color:'#009c8e', rules:['izhar_nun','idgham_nun','iqlab_nun','ikhfa_nun'] },
    mim: { name:'мима', color:'#2563eb', rules:['izhar_mim','idgham_mim','ikhfa_mim'] },
  };

  // Демо: аят с обеими группами, задание — найти правила НУНА
  const ayahId = 'ay_idm_3';
  const group = GROUPS.nun;   // ← группа задания
  const ayah = AYAH_BY_ID[ayahId];
  const words = ayah.text.split(' ');
  const allMarks = AYAH_MARKS[ayahId] || [];
  // цели ТОЛЬКО этой группы
  const targets = {};
  allMarks.forEach(m => { if (group.rules.indexOf(m.rule) !== -1) targets[m.w] = m.rule; });

  document.documentElement.style.setProperty('--group-color', group.color);
  $('grp-name').textContent = group.name;

  const chosen = {};
  let activeWord = null;

  function renderAyah() {
    $('ayah').innerHTML = words.map((w, i) => {
      let cls = 'word';
      if (chosen[i]) cls += ' marked';
      if (activeWord === i) cls += ' active';
      const style = chosen[i] ? ('style="background:' + ruleAccent(chosen[i]) + '"') : '';
      return '<span class="' + cls + '" data-i="' + i + '" ' + style + '>' + w + '</span>';
    }).join(' ');
    $('ayah').querySelectorAll('.word').forEach(el => {
      el.addEventListener('click', () => openPicker(parseInt(el.getAttribute('data-i'), 10)));
    });
    $('count').textContent = Object.keys(chosen).length;
  }

  function openPicker(i) {
    activeWord = i;
    renderAyah();
    $('pw').textContent = words[i];
    // варианты — ТОЛЬКО правила группы (нун=4, мим=3)
    $('rule-btns').innerHTML = group.rules.map(r => {
      const c = ruleAccent(r);
      return '<button class="rule-btn" data-rule="' + r + '" style="--btn-color:' + c + ';--btn-tint:' + c + '22">' +
             '<span class="dot"></span>' + RULE_NAMES[r] + '</button>';
    }).join('');
    $('clear').style.display = chosen[i] ? '' : 'none';
    $('rule-btns').querySelectorAll('.rule-btn').forEach(b => {
      b.addEventListener('click', () => {
        chosen[i] = b.getAttribute('data-rule');
        closePicker(); renderAyah();
      });
    });
    $('picker').classList.add('up');
    $('actbar').style.display = 'none';
  }

  function closePicker() {
    activeWord = null;
    $('picker').classList.remove('up');
    $('actbar').style.display = '';
    renderAyah();
  }

  $('clear').addEventListener('click', () => {
    if (activeWord != null) delete chosen[activeWord];
    closePicker();
  });

  $('btn-done').addEventListener('click', () => {
    let right = 0, missed = 0, wrong = 0;
    Object.keys(targets).forEach(w => { if (chosen[w] === targets[w]) right++; else missed++; });
    Object.keys(chosen).forEach(w => { if (targets[w] !== chosen[w]) wrong++; });
    alert('Правила ' + group.name + ' в аяте: ' + Object.keys(targets).length +
          '\nНашёл верно: ' + right + '\nПропустил/ошибся: ' + missed +
          '\nЛишних: ' + wrong);
  });

  renderAyah();
})();
</script>
</body>
</html>
